<svg viewBox="0 0 100 100" version="1.1" xmlns="http://www.w3.org/2000/svg">
<svg width="100" height="100" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" version="1.1">

  <!-- 外圈光环（更清晰） -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#00c951" stroke-width="2" opacity="0.25"/>

  <!-- 中心核心 -->
  <circle cx="100" cy="100" r="16" fill="#00c951"/>

  <!-- AI 电路线 -->
  <g stroke="#00c951" stroke-width="2.5" stroke-linecap="round">
    <line x1="100" y1="30" x2="100" y2="75"/>
    <line x1="100" y1="125" x2="100" y2="170"/>
    <line x1="30" y1="100" x2="75" y2="100"/>
    <line x1="125" y1="100" x2="170" y2="100"/>

    <line x1="55" y1="55" x2="82" y2="82"/>
    <line x1="145" y1="55" x2="118" y2="82"/>
    <line x1="55" y1="145" x2="82" y2="118"/>
    <line x1="145" y1="145" x2="118" y2="118"/>
  </g>

  <!-- 节点（更锐利） -->
  <g fill="#00c951">
    <circle cx="100" cy="30" r="4"/>
    <circle cx="100" cy="170" r="4"/>
    <circle cx="30" cy="100" r="4"/>
    <circle cx="170" cy="100" r="4"/>

    <circle cx="55" cy="55" r="3"/>
    <circle cx="145" cy="55" r="3"/>
    <circle cx="55" cy="145" r="3"/>
    <circle cx="145" cy="145" r="3"/>
  </g>

</svg>
</svg>