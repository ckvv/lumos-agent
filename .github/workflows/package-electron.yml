name: Package Electron App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.target.label }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - label: macOS Apple Silicon
            runner: macos-latest
            platform: darwin
            arch: arm64
            artifact_name: lumos-macos-arm64
          - label: macOS Intel
            runner: macos-15-intel
            platform: darwin
            arch: x64
            artifact_name: lumos-macos-x64
          - label: Windows
            runner: windows-latest
            platform: win32
            arch: x64
            artifact_name: lumos-windows-x64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build distributables
        run: pnpm exec electron-forge make --platform=${{ matrix.target.platform }} --arch=${{ matrix.target.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact_name }}
          path: out/make/**
          if-no-files-found: error
          retention-days: 14
