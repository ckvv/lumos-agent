name: Package Electron App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.target.label }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - label: macOS Apple Silicon
            runner: macos-latest
            platform: darwin
            arch: arm64
            artifact_name: lumos-macos-arm64
          - label: macOS Intel
            runner: macos-15-intel
            platform: darwin
            arch: x64
            artifact_name: lumos-macos-x64
          - label: Windows
            runner: windows-latest
            platform: win32
            arch: x64
            artifact_name: lumos-windows-x64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build distributables
        run: pnpm exec electron-forge make --platform=${{ matrix.target.platform }} --arch=${{ matrix.target.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact_name }}
          path: out/make/**
          if-no-files-found: error
          retention-days: 14

      - name: Ensure release exists
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes >/dev/null 2>&1 \
            || gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find out/make -type f -print0)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found in out/make"
            exit 1
          fi

          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
